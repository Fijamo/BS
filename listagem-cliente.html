<!-- Define o documento em HTML5 -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- Define a codificação do documento -->
    <meta charset="UTF-8">
    <!-- Adapta a página a vários dispositivos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba -->
    <title>Listagem de Clientes</title>
    <!-- Liga ao CSS externo -->
    <link rel="stylesheet" href="estilos/geral.css">
</head>
<body class="pagina-listagem">
    <!-- Área principal que envolve todo o conteúdo da listagem -->
    <main class="app-page-shell">
        <!-- Cartão central que organiza o cabeçalho e as tabelas -->
        <section class="app-page-card app-page-card-wide">
            <!-- Cabeçalho da página com atalho para voltar ao painel -->
            <div class="app-page-head">
                <a href="dashboard.html" class="app-back-link">Voltar ao painel</a>
                <span class="app-kicker">Carteira</span>
                <h1>Listagem de clientes</h1>
                <p>Consulte clientes agrupados por ramo e acompanhe o estado atual das respetivas apólices.</p>
            </div>

            <!-- Elemento section com atributo class="app-table-group" agrupando a tabela de um ramo de seguros -->
            <section class="app-table-group">
                <!-- Elemento div com atributo class="app-table-label automovel" que ser estilo de rótulo e classe automovel para cor específica -->
                <div class="app-table-label automovel">Automóvel</div>
                <!-- Elemento div com atributo class="app-table-wrap" que envolve a tabela com scroll horizontal se necessário -->
                <div class="app-table-wrap">
                    <table class="app-table">
                        <thead>
                            <!-- Elemento tr que representa uma linha da tabela com és as colunas de cabeçalho -->
                            <tr>
                                <th>Apelido</th>
                                <th>Nome</th>
                                <th>Matrícula</th>
                                <th>Nº Apólice</th>
                                <th>Datas</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <!-- Elemento tbody com atributo id="listaAutomovel" que agrupa as linhas de dados, id para identificação e possivelmente preenchido via JavaScript -->
                        <tbody id="listaAutomovel"></tbody>
                    </table>
                </div>
            </section>

            <!-- Elemento section com atributo class="app-table-group" agrupando a tabela do ramo de vida -->
            <section class="app-table-group">
                <!-- Elemento div com atributo class="app-table-label vida" que define rótulo com estilo e classe vida para cor específica -->
                <div class="app-table-label vida">Vida</div>
                <div class="app-table-wrap">
                    <table class="app-table">
                        <thead>
                            <!-- Cabeçalho com as colunas da carteira de seguro de vida -->
                            <tr>
                                <th>Apelido</th>
                                <th>Nome</th>
                                <th>Nº Apólice</th>
                                <th>Datas</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                <!-- Elemento tbody com atributo id="listaVida" que agrupa as linhas de dados, id para identificação e possivelmente preenchido via JavaScript -->
                        <tbody id="listaVida"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

</body>
</html>
