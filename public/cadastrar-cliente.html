<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="stylesheets/geral.css">
</head>

<body class="pagina-formulario pagina-cadastro-cliente">
    <main class="app-page-shell">
        <section class="app-page-card app-page-card-wide">
            <div class="app-page-head">
                <a href="dashboard.html" class="app-back-link">Voltar ao painel</a>
                <h1>Cadastro de cliente</h1>
                <p>Registe dados do segurado, da apolice e das informacoes de contacto.</p>
            </div>
            <div id="mensagem-cadastro" class="search-empty-state" style="display: none;"></div>
<form class="app-form-grid app-form-grid-4" action="/api/clientes" method="POST">                <label class="app-field app-span-2">
                    <span>Apelido</span>
                    <input type="text" name="apelido" required>
                </label>
                <label class="app-field app-span-2">
                    <span>Nome completo</span>
                    <input type="text" name="nome" required>
                </label>
                <label class="app-field app-span-2">
                    <span>Numero da apolice</span>
                    <input type="text" name="apolice" required>
                </label>
                <label class="app-field app-span-2">
                    <span>Ramo</span>
                    <select name="ramo" required>
                        <option value="">Selecione o ramo</option>
                        <option>Automovel</option>
                        <option>Vida</option>
                        <option>Multirriscos</option>
                        <option>Viagem</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Matricula</span>
                    <input type="text" name="matricula">
                </label>
                <label class="app-field app-span-2">
                    <span>Marca e modelo</span>
                    <input type="text" name="marcaModelo">
                </label>
                <label class="app-field">
                    <span>Ano de fabrico</span>
                    <input type="number" name="anoFabrico">
                </label>
                <label class="app-field">
                    <span>Quilometragem</span>
                    <input type="number" name="quilometragem">
                </label>
                <label class="app-field">
                    <span>Data de inicio</span>
                    <input type="date" name="dataInicio">
                </label>
                <label class="app-field">
                    <span>Data de fim</span>
                    <input type="date" name="dataFim">
                </label>
                <label class="app-field">
                    <span>Duracao</span>
                    <input type="number" name="duracao">
                </label>
                <label class="app-field">
                    <span>Tipo</span>
                    <select name="tipoDuracao">
                        <option>Dias</option>
                        <option>Meses</option>
                        <option>Anual</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Contacto principal</span>
                    <input type="text" name="contactoPrincipal" required>
                </label>
                <label class="app-field app-span-2">
                    <span>Contacto alternativo</span>
                    <input type="text" name="contactoAlternativo">
                </label>
                <label class="app-field app-span-4">
                    <span>Endereco completo</span>
                    <input type="text" name="endereco" required>
                </label>
                <label class="app-field app-span-2">
                    <span>Seguradora</span>
                    <select name="seguradora" required>
                        <option value="">Selecione a seguradora</option>
                        <option>Emose</option>
                        <option>Indico</option>
                        <option>Horizonte</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Estado da apólice</span>
                    <select name="estadoApolice" required>
                        <option value="">Selecione</option>
                        <option>Ativa</option>
                        <option>Vencida</option>
                        <option>Cancelada</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Estado geral do veiculo</span>
                    <select name="estadoVeiculo">
                        <option value="">Selecione</option>
                        <option>Excelente</option>
                        <option>Bom</option>
                        <option>Razoavel</option>
                        <option>Mau</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Danos visiveis</span>
                    <select name="danosVisiveis">
                        <option value="">Selecione</option>
                        <option>Nao</option>
                        <option>Sim, leves</option>
                        <option>Sim, moderados</option>
                        <option>Sim, graves</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Estado da carrocaria</span>
                    <select name="estadoCarrocaria">
                        <option value="">Selecione</option>
                        <option>Sem danos</option>
                        <option>Com riscos</option>
                        <option>Com amolgadelas</option>
                    </select>
                </label>
                <label class="app-field app-span-2">
                    <span>Estado dos pneus</span>
                    <select name="estadoPneus">
                        <option value="">Selecione</option>
                        <option>Bom</option>
                        <option>Desgaste moderado</option>
                        <option>Desgaste acentuado</option>
                    </select>
                </label>
                <label class="app-field app-span-4">
                    <span>Observacoes</span>
                    <textarea name="observacoesAvaliacao" rows="4"></textarea>
                </label>
                <label class="app-field app-span-4">
                    <span>Parecer de segurabilidade</span>
                    <select name="parecerSegurabilidade" required>
                        <option value="">Selecione</option>
                        <option>Apto para seguro</option>
                        <option>Apto com ressalvas</option>
                        <option>Necessita vistoria complementar</option>
                        <option>Nao apto para seguro</option>
                    </select>
                </label>
                <div class="app-form-actions app-span-4">
                    <button type="submit" class="app-btn app-btn-primary">Guardar cliente</button>
                    <a href="dashboard.html" class="app-btn app-btn-secondary">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
    <script>
        const paramsCadastro = new URLSearchParams(window.location.search);
        const erroCadastro = paramsCadastro.get("erro");
        const caixaCadastro = document.getElementById("mensagem-cadastro");
        const mensagensCadastro = {
            campos: "Preencha os campos obrigatorios.",
            duplicado: "Ja existe uma apolice com esse numero.",
            servidor: "Nao foi possivel guardar o cliente."
        };

        if (erroCadastro && mensagensCadastro[erroCadastro]) {
            caixaCadastro.style.display = "block";
            caixaCadastro.textContent = mensagensCadastro[erroCadastro];
        }
    </script>
</body>

</html>
