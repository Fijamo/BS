<!-- Define o documento como HTML5 -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <!-- Define a codificação do documento -->
    <meta charset="UTF-8">
    <!-- Faz a página adaptar-se a vários tamanhos de ecrã -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define o título mostrado na aba do navegador -->
    <title>Verificar Seguro</title>
    <!-- Liga esta página ao ficheiro CSS principal -->
    <link rel="stylesheet" href="estilos/geral.css">
</head>
<body class="pagina-formulario pagina-verificar-seguro">
    <!-- Área principal da funcionalidade de verificação -->
    <main class="app-page-shell">
        <!-- Cartão central com cabeçalho e formulário -->
        <section class="app-page-card">
            <!-- Cabeçalho da página com contexto e navegação -->
            <div class="app-page-head">
                <a href="dashboard.html" class="app-back-link">Voltar ao painel</a>
               
                <h1>Verificar seguro</h1>
                <p>Consulte rapidamente o estado de uma apólice pesquisando por nome do cliente ou pelo número da apólice.</p>
            </div>

            <!-- Elemento form com atributo class="app-form-grid app-form-grid-2" criando grid com 2 colunas, id="form-verificar-seguro" identificando o formulário -->
            <form class="app-form-grid app-form-grid-2" id="form-verificar-seguro">
                <!-- Campo para escolher o tipo de pesquisa -->
                <label class="app-field">
                    <span>Pesquisar por</span>
                    <!-- Elemento select com atributo id="tipoPesquisaSeguro" para acesso em JavaScript, required=true obrigando seleção -->
                    <select id="tipoPesquisaSeguro" required>
                        <option value="apolice">Número da apólice</option>
                        <option value="nome">Nome do cliente</option>
                    </select>
                </label>

                <!-- Campo único que recebe o nome ou o número da apólice -->
                <label class="app-field">
                    <span>Valor da pesquisa</span>
                    <!-- Elemento input com atributo type="text" para texto, id="valorPesquisaSeguro" para acesso em JavaScript, placeholder="Digite o número da apólice ou o nome do cliente", required=true obrigando preenchimento -->
                    <input type="text" id="valorPesquisaSeguro" placeholder="Digite o número da apólice ou o nome do cliente" required>
                </label>

                <!-- Área de ações do formulário -->
                <div class="app-form-actions app-field-full">
                    <button type="submit" class="app-btn app-btn-primary">Verificar seguro</button>
                </div>
            </form>

            <!-- Elemento div com atributo class="app-inline-status" exibindo resultado da verificação, id="resultado" para acesso em JavaScript -->
            <div class="app-inline-status" id="resultado"></div>
        </section>
    </main>
    <script>
        const form = document.getElementById("form-verificar-seguro");
        const tipoPesquisa = document.getElementById("tipoPesquisaSeguro");
        const valorPesquisa = document.getElementById("valorPesquisaSeguro");
        const resultado = document.getElementById("resultado");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            resultado.innerHTML = "A verificar...";

            try {
                const params = new URLSearchParams();
                if (tipoPesquisa.value === "apolice") {
                    params.set("query", valorPesquisa.value.trim());
                } else {
                    params.set("query", valorPesquisa.value.trim());
                }

                const resposta = await fetch(`/api/clientes?${params.toString()}`);
                const clientes = await resposta.json();

                if (!clientes.length) {
                    resultado.innerHTML = '<div class="status-error">Nenhum seguro encontrado com os critérios fornecidos.</div>';
                    return;
                }

                const cliente = clientes[0]; // Assuming first match
                resultado.innerHTML = `
                    <div class="status-success">
                        <h3>Seguro encontrado</h3>
                        <p><strong>Cliente:</strong> ${cliente.nome} ${cliente.apelido}</p>
                        <p><strong>Apólice:</strong> ${cliente.apolice}</p>
                        <p><strong>Estado:</strong> ${cliente.estado_apolice}</p>
                        <p><strong>Seguradora:</strong> ${cliente.seguradora}</p>
                    </div>
                `;
            } catch (erro) {
                resultado.innerHTML = '<div class="status-error">Erro ao verificar o seguro.</div>';
            }
        });
    </script>
</body>
</html>
