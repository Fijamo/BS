<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Relatório</title>
    <link rel="stylesheet" href="stylesheets/geral.css">
</head>

<body class="pagina-formulario pagina-relatorio">

<main class="app-page-shell">

<section class="app-page-card">

    <div class="app-page-head">
        <a href="dashboard.html" class="app-back-link">Voltar ao painel</a>

        <h1>Gerar relatório</h1>
        <p>Filtre os dados e faça download do relatório.</p>
    </div>

    <form class="app-form-grid app-form-grid-2" id="form-relatorio">

        <!--  PERÍODO -->
        <label class="app-field">
            <span>Data inicial</span>
            <input type="date" id="dataInicio" required>
        </label>

        <label class="app-field">
            <span>Data final</span>
            <input type="date" id="dataFim" required>
        </label>

        <!--  ESTADO DA APÓLICE -->
        <label class="app-field">
            <span>Estado da apólice</span>
            <select id="estadoApolice">
                <option value="todos">Todos</option>
                <option value="Ativa">Ativa</option>
                <option value="Vencida">Vencida</option>
                <option value="Cancelada">Cancelada</option>
            </select>
        </label>

        <!--  SEGURADORA -->
        <label class="app-field">
            <span>Seguradora</span>
            <select id="seguradora">
                <option value="geral">Geral</option>
                <option value="Emose">Emose</option>
                <option value="Indico">Indico</option>
                <option value="Horizonte">Horizonte</option>
            </select>
        </label>

        <!-- BOTÃO -->
        <div class="app-form-actions app-field-full">
            <button type="button" class="app-btn app-btn-dark" id="btnBaixarRelatorio">
                Baixar relatório
            </button>
        </div>

    </form>

    <div class="app-inline-status" id="statusRelatorio">
        Configure os filtros e gere o relatório.
    </div>

</section>

</main>

<!-- SCRIPT INTERNO DE TESTE -->
<script>
document.getElementById('btnBaixarRelatorio').addEventListener('click', () => {

    const inicio = document.getElementById('dataInicio').value;
    const fim = document.getElementById('dataFim').value;
    const estado = document.getElementById('estadoApolice').value;
    const seguradora = document.getElementById('seguradora').value;

    const url =
        `/api/relatorio/excel?inicio=${inicio}&fim=${fim}&estado=${estado}&seguradora=${seguradora}`;

    window.location.href = url;

});
</script>

</body>
</html>
