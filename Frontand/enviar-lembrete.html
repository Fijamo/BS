<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Lembrete</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="estilos/geral.css">
</head>

<body>

    <div class="container my-5">
        <!-- Botão voltar -->
        <div class="mb-3">
            <a href="index.html" class="btn btn-secondary">Voltar</a>
        </div>


        <h1 class="text-center mb-4">✉️ Enviar Lembrete</h1>

        <div class="card p-4 shadow-sm">
            <form>
                <div class="mb-3">
                    <label for="nomeCliente" class="form-label">Nome do Cliente *</label>
                    <input type="text" id="nomeCliente" class="form-control" placeholder="Digite o nome completo">
                </div>

                <div class="mb-3">
                    <label for="emailCliente" class="form-label">Email *</label>
                    <input type="email" id="emailCliente" class="form-control" placeholder="Digite o email">
                </div>

                <div class="mb-3">
                    <label for="mensagem" class="form-label">Mensagem *</label>
                    <textarea id="mensagem" class="form-control" rows="4"
                        placeholder="Digite a mensagem do lembrete"></textarea>
                </div>

                <button type="submit" class="btn btn-warning">Enviar Lembrete</button>
            </form>

            <!-- Status inline -->
            <div class="mt-4" id="statusEnvio" style="font-weight: 600;">
                <span><!-- Resultado do envio aparecerá aqui --></span>
            </div>
        </div>

    </div>

</body>

</html>
