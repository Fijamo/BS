<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Relatório</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="estilos/geral.css">
</head>

<body>

    <div class="container my-5">
        <!-- Botão voltar -->
        <div class="mb-3">
            <a href="index.html" class="btn btn-secondary">Voltar</a>
        </div>


        <h1 class="text-center mb-4">📄 Gerar Relatório</h1>

        <div class="card p-4 shadow-sm">
            <form>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="dataInicio" class="form-label">Data Início *</label>
                        <input type="date" id="dataInicio" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="dataFim" class="form-label">Data Fim *</label>
                        <input type="date" id="dataFim" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="tipoRelatorio" class="form-label">Tipo de Relatório *</label>
                    <select id="tipoRelatorio" class="form-select">
                        <option value="">Selecione o tipo</option>
                        <option value="ativos">Seguros Ativos</option>
                        <option value="vencidos">Seguros Vencidos</option>
                        <option value="todos">Todos os Seguros</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Gerar Relatório</button>
            </form>

            <!-- Resultado inline -->
            <div class="mt-4" id="resultadoRelatorio" style="font-weight: 600;">
                <span><!-- Resultado do relatório aparecerá aqui --></span>
            </div>
        </div>

    </div>

</body>

</html>
