<!-- Define o tipo de documento como HTML5 -->
<!DOCTYPE html>

<!-- Início do documento HTML e define que o idioma da página é português -->
<html lang="pt">

<head>

    <!-- Define o conjunto de caracteres usado na página (UTF-8 suporta acentos) -->
    <meta charset="UTF-8">

    <!-- Faz a página adaptar-se ao tamanho da tela (responsividade em celulares e tablets) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página que aparece na aba do navegador -->
    <title>Bons Sinais Dashboard</title>

    <!-- Importa a biblioteca de ícones Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Importa o arquivo CSS externo para estilos personalizados -->
    <link rel="stylesheet" href="estilos/geral.css">

</head>

<!-- Corpo da página onde aparece todo o conteúdo visível -->

<body class="py-5">

    <!-- Container do Bootstrap que centraliza o conteúdo -->
    <div class="container">

        <!-- Cabeçalho principal do sistema -->
        <div class="text-center mb-5">

            <!-- Título grande do sistema -->
            <h1 class="display-4 fw-bold text-dark">
                BONS SINAIS
            </h1>

        </div>

        <!-- Área de pesquisa e filtro -->
        <div class="row justify-content-center mb-5 g-3">

            <!-- Campo de pesquisa -->
            <div class="col-lg-5 col-md-6">

                <!-- Campo de texto para pesquisar clientes ou apólices -->
                <input type="text" class="form-control form-control-lg"
                    placeholder="Pesquisar cliente, apólice ou nome">

            </div>

            <!-- Campo de seleção para filtrar apólices -->
            <div class="col-lg-3 col-md-6">

                <!-- Menu dropdown -->
                <select class="form-select form-select-lg">

                    <!-- Opções do filtro -->
                    <option>Todas as apólices</option>
                    <option>Ativa</option>
                    <option>Vencida</option>
                    <option>Cancelada</option>

                </select>

            </div>

        </div>

    <!-- Área de ações rápidas do sistema -->
<div class="row g-4 mb-5 justify-content-center">

    <!-- Botão cadastrar cliente -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="cadastrar-cliente.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-person-plus fs-3 d-block mb-2"></i>
            <small>Cadastrar Cliente</small>
        </a>
    </div>

    <!-- Botão pesquisar cliente -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="pesquisar-cliente.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-search fs-3 d-block mb-2"></i>
            <small>Pesquisar Cliente</small>
        </a>
    </div>

    <!-- Botão verificar seguro -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="verificar-seguro.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-check-circle fs-3 d-block mb-2"></i>
            <small>Verificar Seguro</small>
        </a>
    </div>

    <!-- Botão gerar relatórios -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="gerar-relatorio.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-file-earmark-text fs-3 d-block mb-2"></i>
            <small>Gerar Relatórios</small>
        </a>
    </div>

    <!-- Botão listar clientes -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="listagem-cliente.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-list-ul fs-3 d-block mb-2"></i>
            <small>Listagem de Clientes</small>
        </a>
    </div>

    <!-- Botão enviar lembrete -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="enviar-lembrete.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-clock fs-3 d-block mb-2"></i>
            <small>Enviar Lembrete</small>
        </a>
    </div>

    <!-- 🔥 NOVO BOTÃO: SINISTRO / PERÍCIA -->
    <div class="col-lg-3 col-md-4 col-sm-6">
        <a href="sinistro.html"
            class="btn btn-dark btn-dashboard w-100 dashboard-card text-center py-4">
            <i class="bi bi-shield-fill-exclamation fs-3 d-block mb-2"></i>
            <small>Sinistro / Perícia</small>
        </a>
    </div>

</div>


        
        <!-- Área de alertas e métricas do sistema -->
        <div class="row g-4 mb-5 justify-content-center">

            <!-- Alerta de apólices vencendo -->
            <div class="col-xl-3 col-lg-6 col-md-6">

                <div class="alert-card p-4 dashboard-card d-flex align-items-center gap-3 bg-danger-subtle text-danger">

                    <i class="bi bi-exclamation-triangle fs-2"></i>

                    <div>Apólices vencendo: 3</div>

                </div>

            </div>

            <!-- Alerta de pagamentos atrasados -->
            <div class="col-xl-3 col-lg-6 col-md-6">

                <div
                    class="alert-card p-4 dashboard-card d-flex align-items-center gap-3 bg-warning-subtle text-warning">

                    <i class="bi bi-credit-card fs-2"></i>

                    <div>Pagamentos atrasados: 5</div>

                </div>

            </div>

            <!-- Alerta de novos leads -->
            <div class="col-xl-3 col-lg-6 col-md-6">

                <div class="alert-card p-4 dashboard-card d-flex align-items-center gap-3 bg-info-subtle text-info">

                    <i class="bi bi-star fs-2"></i>

                    <div>Novos leads: 2</div>

                </div>

            </div>

            <!-- Alerta de mensagens internas -->
            <div class="col-xl-3 col-lg-6 col-md-6">

                <div
                    class="alert-card p-4 dashboard-card d-flex align-items-center gap-3 bg-success-subtle text-success">

                    <i class="bi bi-chat-dots fs-2"></i>

                    <div>Mensagens internas: 1</div>

                </div>

            </div>

        </div>

        <!-- Botão para sair do sistema -->
        <div class="text-center">

            <a href="/" class="btn btn-danger btn-lg btn-dashboard px-5">

                <!-- Ícone de saída -->
                <i class="bi bi-box-arrow-right me-0"></i>

                <!-- Texto do botão -->
              Sair

            </a>

        </div>

    </div>

</body>

</html>
