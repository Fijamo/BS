<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Cliente</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="estilos/geral.css">

</head>

<body>

    <div class="container">

        <div class="card card-custom p-4">

            <h2 class="text-center mb-4">Cadastro de Cliente</h2>

            <form>

                <div class="row g-3">

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Apelido *">
                    </div>

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Nome completo *">
                    </div>

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Número da Apólice *">
                    </div>

                    <div class="col-md-6">
                        <select class="form-select">
                            <option>Selecione o Ramo *</option>
                            <option>Automóvel</option>
                            <option>Acidentes Pessoais</option>
                            <option>Multirriscos</option>
                            <option>Vida</option>
                            <option>Acidente de Trabalho</option>
                            <option>Casco Maritmo</option>
                            <option>Fogo</option>
                            <option>Viagen</option>
                            <option>Mercadoria</option>
                            <option>Empretagem</option>
                            <option>Responsablidade Civil</option>
                            

                        </select>
                    </div>

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Matrícula do Veículo">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Data Início</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Data Fim</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <input type="number" class="form-control" placeholder="Duração">
                    </div>

                    <div class="col-md-3">
                        <select class="form-select">
                            <option>Tipo</option>
                            <option>Dias</option>
                            <option>Meses</option>
                            <option>Anual</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Contacto Principal *">
                    </div>

                    <div class="col-md-6">
                        <input type="text" class="form-control" placeholder="Contacto Alternativo">
                    </div>

                    <div class="col-12">
                        <input type="text" class="form-control" placeholder="Endereço completo *">
                    </div>

                    <div class="col-md-6">
                        <select class="form-select">
                            <option>Selecione a Seguradora *</option>
                            <option>Emose</option>
                            <option>Indico</option>
                            <option>Horizonte</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <select class="form-select">
                            <option>Tipo de Seguro *</option>
                            <option>Automóvel</option>
                            <option>Vida</option>
                            <option>Saúde</option>
                        </select>
                    </div>

                    <div class="col-12 mt-3">

                        <button class="btn btn-primary w-100 p-3">
                            Guardar Cliente
                        </button>

                    </div>

                    <div class="col-12 text-center mt-3">

                        <a href="index.html" class="btn btn-danger">
                            Voltar
                        </a>

                    </div>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
