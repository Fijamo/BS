<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Perícia</title>

    <link rel="stylesheet" href="estilos/geral.css">

</head>

<body class="bg-light">

    <div class="container py-5">

        <h2 class="text-center mb-4">Painel de Sinistro / Perícia</h2>

        <!-- IMPORTANTE: enctype para upload -->
        <form action="processar_sinistro.php" method="POST" enctype="multipart/form-data">

            <!-- Cliente -->
            <div class="mb-3">
                <label class="form-label">Cliente</label>
                <input type="text" name="Digite o nome" class="form-control" placeholder="Nome do clinte" required>
            </div>

            <!-- Tipo -->
            <div class="mb-3">
                <label class="form-label">Tipo de Sinistro</label>
                <select name="tipo" class="form-select">
                    <option>Acidente</option>
                    <option>Roubo</option>
                    <option>Incêndio</option>
                    <option>Outro</option>
                </select>
            </div>

            <!-- Data -->
            <div class="mb-3">
                <label class="form-label">Data</label>
                <input type="date" name="data" class="form-control" required>
            </div>

            <!-- Descrição -->
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea name="descricao" class="form-control"></textarea>
            </div>

            <!-- Resultado -->
            <div class="mb-3">
                <label class="form-label">Resultado da Perícia</label>
                <textarea name="resultado" class="form-control"></textarea>
            </div>

            <!-- Valor -->
            <div class="mb-3">
                <label class="form-label">Valor (MZN)</label>
                <input type="number" name="valor" class="form-control">
            </div>

            <!-- 🔥 NOVO: Upload de documento -->
            <div class="mb-3">
                <label class="form-label">Anexar Relatório (PDF/Imagem)</label>
                <input type="file" name="arquivo" class="form-control" accept=".pdf,.jpg,.png">
            </div>

            <!-- Botão -->
            <button type="submit" class="btn btn-success w-100">
                Enviar Relatório
            </button>

        </form>

    </div>

</body>

</html>
